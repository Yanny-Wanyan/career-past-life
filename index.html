<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>职场前世档案 · 大AI朝吏部鉴定</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --red:#8B2500;--red-light:#B8432F;
    --gold:#C5963A;--gold-light:#E8C97A;--gold-dim:rgba(197,150,58,0.15);
    --paper:#F5E6C8;--paper-dark:#E8D5A8;--paper-light:#FDF5E6;
    --ink:#2C1810;--ink-light:#5C3A28;--ink-dim:#8B7355;
    --bg-dark:#1a0e08;--bg-mid:#2C1810;--bg-glow:#3a1f12;
    --green:#5B7744;--green-light:#8BAA6E;
  }
  body{font-family:'Noto Serif SC',serif;background:var(--bg-dark);min-height:100vh;display:flex;justify-content:center;overflow-x:hidden}
  .app{width:100%;max-width:420px;min-height:100vh;position:relative;background:linear-gradient(180deg,var(--bg-mid),var(--bg-dark))}

  /* === Screens === */
  .screen{display:none;flex-direction:column;align-items:center;min-height:100vh}.screen.active{display:flex}

  /* === START === */
  #screen-start{justify-content:center;background:radial-gradient(ellipse at center,var(--bg-glow),var(--bg-dark) 70%);padding:40px 24px;position:relative;overflow:hidden}
  #screen-start::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5L35 25 55 30 35 35 30 55 25 35 5 30 25 25Z' fill='%23C5963A' opacity='.03'/%3E%3C/svg%3E");pointer-events:none}
  .scroll-container{width:100%;animation:scrollUnroll 1.2s ease-out forwards}
  @keyframes scrollUnroll{0%{transform:scaleY(.01);opacity:0}50%{transform:scaleY(.5);opacity:.8}100%{transform:scaleY(1);opacity:1}}
  .scroll-body{background:linear-gradient(180deg,var(--paper),var(--paper-dark));border:3px solid var(--gold);border-radius:8px;padding:50px 28px 40px;position:relative;box-shadow:0 0 30px rgba(197,150,58,.3),inset 0 0 60px rgba(197,150,58,.05);text-align:center}
  .scroll-body::before,.scroll-body::after{content:'';position:absolute;left:10%;right:10%;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
  .scroll-body::before{top:15px}.scroll-body::after{bottom:15px}

  .seal{width:80px;height:80px;border:3px solid var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;transform:rotate(-8deg);color:var(--red);font-family:'Ma Shan Zheng',cursive;font-size:26px;line-height:1.1;position:relative}
  .seal::after{content:'';position:absolute;inset:-6px;border:1px solid var(--red);border-radius:10px;opacity:.4}
  .main-title{font-family:'Ma Shan Zheng',cursive;font-size:34px;color:var(--ink);margin-bottom:6px;letter-spacing:4px}
  .sub-title{font-size:14px;color:var(--ink-light);margin-bottom:24px;letter-spacing:2px}
  .divider{width:60%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 20px}
  .name-input-group{margin-bottom:24px}
  .name-input-group label{display:block;font-size:13px;color:var(--ink-light);margin-bottom:8px}
  .name-input-group input{width:70%;padding:10px 14px;border:2px solid var(--gold);border-radius:6px;background:rgba(255,255,255,.6);font-family:'Ma Shan Zheng',cursive;font-size:22px;text-align:center;color:var(--ink);outline:none;transition:.3s}
  .name-input-group input::placeholder{color:#b8a080;font-size:17px}
  .name-input-group input:focus{border-color:var(--red);box-shadow:0 0 12px rgba(139,37,0,.2)}

  .btn{padding:13px 46px;border:2px solid var(--gold);border-radius:6px;background:linear-gradient(180deg,var(--red),#6B1D00);color:var(--gold-light);font-family:'Ma Shan Zheng',cursive;font-size:21px;letter-spacing:6px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
  .btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(139,37,0,.4)}
  .btn:active{transform:translateY(0)}
  .btn::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);animation:btnShine 3s infinite}
  @keyframes btnShine{0%{left:-100%}100%{left:200%}}
  .start-hint{margin-top:16px;font-size:12px;color:var(--ink-light);opacity:.6}

  /* === QUIZ === */
  #screen-quiz{background:linear-gradient(180deg,var(--bg-mid),var(--bg-dark));padding:0}
  .quiz-header{width:100%;padding:18px 20px;display:flex;align-items:center;gap:12px}
  .progress-bar{flex:1;height:6px;background:var(--gold-dim);border-radius:3px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:3px;transition:width .5s ease}
  .progress-text{color:var(--gold);font-size:13px;min-width:40px;text-align:right}

  .quiz-card{width:calc(100% - 28px);margin:0 14px;background:linear-gradient(180deg,var(--paper),var(--paper-dark));border:2px solid var(--gold);border-radius:12px;padding:28px 20px;animation:cardIn .4s ease-out;position:relative;overflow:hidden}
  .quiz-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--red),var(--gold),var(--red))}
  @keyframes cardIn{0%{transform:translateX(50px);opacity:0}100%{transform:translateX(0);opacity:1}}

  .question-scene{font-size:13px;color:var(--ink-light);margin-bottom:4px;opacity:.7}
  .question-text{font-size:17px;font-weight:700;color:var(--ink);line-height:1.6;margin-bottom:22px}
  .options{display:flex;flex-direction:column;gap:10px}
  .option-btn{width:100%;padding:12px 16px;border:1.5px solid rgba(197,150,58,.35);border-radius:8px;background:rgba(255,255,255,.5);font-family:'Noto Serif SC',serif;font-size:14px;color:var(--ink);text-align:left;cursor:pointer;transition:all .25s;line-height:1.5}
  .option-btn:hover{border-color:var(--gold);background:rgba(197,150,58,.1);transform:translateX(3px)}
  .option-btn:active,.option-btn.selected{border-color:var(--red);background:rgba(139,37,0,.08);color:var(--red);font-weight:700}
  .opt-label{display:inline-block;width:22px;height:22px;line-height:22px;text-align:center;border-radius:50%;background:var(--gold);color:#fff;font-size:11px;font-weight:700;margin-right:8px;vertical-align:middle}
  .option-btn.selected .opt-label{background:var(--red)}

  /* roast toast */
  .roast-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(44,24,16,.95);border:1px solid var(--gold);border-radius:20px;padding:10px 22px;color:var(--gold-light);font-size:13px;font-family:'Ma Shan Zheng',cursive;letter-spacing:2px;white-space:nowrap;opacity:0;transition:all .4s ease;pointer-events:none;z-index:100;max-width:90vw}
  .roast-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* === LOADING === */
  #screen-loading{justify-content:center;align-items:center;background:radial-gradient(ellipse at center,var(--bg-glow),var(--bg-dark) 70%);gap:24px}
  .loading-seal{width:100px;height:100px;border:3px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;animation:sealPulse 2s ease-in-out infinite;position:relative}
  .loading-seal::before{content:'';position:absolute;inset:-10px;border:1px solid var(--gold);border-radius:50%;opacity:.3;animation:sealRing 2s ease-in-out infinite}
  @keyframes sealPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  @keyframes sealRing{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.15);opacity:0}}
  .loading-icon{font-size:40px}
  .loading-text{color:var(--gold-light);font-family:'Ma Shan Zheng',cursive;font-size:22px;letter-spacing:4px}
  .loading-sub{color:var(--gold);font-size:13px;opacity:.6}

  /* === RESULT === */
  #screen-result{background:radial-gradient(ellipse at center top,var(--bg-glow),var(--bg-dark) 60%);padding:24px 14px 40px;justify-content:flex-start}

  .result-card{width:100%;background:linear-gradient(180deg,var(--paper-light),var(--paper) 30%,var(--paper-dark));border:3px solid var(--gold);border-radius:12px;padding:36px 20px 26px;position:relative;box-shadow:0 0 40px rgba(197,150,58,.25),0 20px 60px rgba(0,0,0,.4);overflow:hidden}
  .result-card::before,.result-card::after{content:'';position:absolute;left:0;right:0;height:6px;background:linear-gradient(90deg,var(--red),var(--gold),var(--red),var(--gold),var(--red))}
  .result-card::before{top:0}.result-card::after{bottom:0}

  .decree-header{text-align:center;margin-bottom:16px}
  .decree-cloud{font-size:18px;opacity:.4}
  .decree-title{font-family:'Ma Shan Zheng',cursive;font-size:24px;color:var(--red);letter-spacing:6px;margin:4px 0}
  .decree-line{width:80%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:12px auto}

  /* avatar area */
  .result-avatar-area{display:flex;justify-content:center;margin-bottom:12px;position:relative}
  .result-avatar{width:90px;height:90px;border-radius:50%;border:3px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:48px;background:linear-gradient(135deg,var(--paper),#fff);box-shadow:0 4px 20px rgba(197,150,58,.3);position:relative}
  .result-avatar .rank-badge{position:absolute;bottom:-4px;right:-4px;background:var(--red);color:var(--gold-light);font-family:'Ma Shan Zheng',cursive;font-size:11px;padding:2px 8px;border-radius:10px;border:1.5px solid var(--gold);white-space:nowrap}

  .decree-body{text-align:center;margin-bottom:12px}
  .decree-opening{font-family:'Ma Shan Zheng',cursive;font-size:17px;color:var(--gold);margin-bottom:12px;letter-spacing:3px}
  .result-name{font-family:'Ma Shan Zheng',cursive;font-size:18px;color:var(--ink)}
  .result-official{font-family:'Ma Shan Zheng',cursive;font-size:40px;color:var(--red);margin:8px 0;letter-spacing:5px;text-shadow:2px 2px 4px rgba(139,37,0,.15);animation:titleGlow 3s ease-in-out infinite}
  @keyframes titleGlow{0%,100%{text-shadow:2px 2px 4px rgba(139,37,0,.15)}50%{text-shadow:2px 2px 20px rgba(139,37,0,.3),0 0 40px rgba(197,150,58,.15)}}
  .result-rank{display:inline-block;padding:3px 16px;border:1.5px solid var(--gold);border-radius:20px;font-size:13px;color:var(--gold);background:rgba(197,150,58,.08);margin-bottom:8px}
  .result-rarity{font-size:11px;color:var(--red-light);margin-top:4px;opacity:.8}

  .result-quote{font-size:14px;color:var(--ink);line-height:1.8;padding:14px 12px;background:rgba(197,150,58,.06);border-left:3px solid var(--gold);border-radius:0 6px 6px 0;margin:10px 0 16px;text-align:left}

  /* biography */
  .bio-section{margin:14px 0;padding:16px 14px;background:rgba(139,37,0,.04);border-radius:8px;border:1px solid rgba(197,150,58,.2)}
  .bio-title{font-family:'Ma Shan Zheng',cursive;font-size:18px;color:var(--red);margin-bottom:10px;text-align:center;letter-spacing:3px}
  .bio-timeline{display:flex;flex-direction:column;gap:8px}
  .bio-event{display:flex;gap:10px;font-size:13px;color:var(--ink);line-height:1.6}
  .bio-age{min-width:42px;color:var(--gold);font-weight:700;text-align:right;flex-shrink:0}
  .bio-text{flex:1}

  /* stats */
  .result-stats{display:flex;flex-direction:column;gap:10px;margin:14px 0}
  .stat-row{display:flex;align-items:center;gap:8px}
  .stat-label{font-size:12px;color:var(--ink-light);min-width:52px;text-align:right}
  .stat-bar{flex:1;height:8px;background:var(--gold-dim);border-radius:4px;overflow:hidden}
  .stat-fill{height:100%;border-radius:4px;transition:width 1s ease}
  .stat-fill.red{background:linear-gradient(90deg,var(--red),var(--red-light))}.stat-fill.gold{background:linear-gradient(90deg,var(--gold),var(--gold-light))}.stat-fill.green{background:linear-gradient(90deg,var(--green),var(--green-light))}
  .stat-val{font-size:11px;color:var(--ink-light);min-width:20px}

  /* cp section */
  .cp-section{margin:14px 0;padding:14px;background:rgba(197,150,58,.06);border-radius:8px;border:1px solid rgba(197,150,58,.2)}
  .cp-title{font-family:'Ma Shan Zheng',cursive;font-size:17px;color:var(--gold);margin-bottom:10px;text-align:center;letter-spacing:2px}
  .cp-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .cp-row:last-child{margin-bottom:0}
  .cp-icon{font-size:24px;flex-shrink:0}
  .cp-info{flex:1}
  .cp-label{font-size:11px;color:var(--ink-dim)}
  .cp-name{font-size:15px;font-weight:700;color:var(--ink)}
  .cp-reason{font-size:12px;color:var(--ink-light);margin-top:2px}
  .cp-divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);margin:8px 0}

  .result-stamp{position:absolute;top:50px;right:16px;width:64px;height:64px;border:3px solid rgba(139,37,0,.55);border-radius:50%;display:flex;align-items:center;justify-content:center;transform:rotate(15deg);font-family:'Ma Shan Zheng',cursive;font-size:17px;color:rgba(139,37,0,.55);line-height:1.1;animation:stampIn .5s ease-out .8s both}
  @keyframes stampIn{0%{transform:rotate(15deg) scale(3);opacity:0}60%{transform:rotate(15deg) scale(.9);opacity:1}100%{transform:rotate(15deg) scale(1);opacity:1}}

  .decree-footer{text-align:center;font-size:12px;color:var(--ink-light);opacity:.6;margin-top:8px}

  .result-actions{display:flex;gap:10px;margin-top:20px;width:100%}
  .result-actions .btn{flex:1;padding:11px 18px;font-size:17px;letter-spacing:3px;text-align:center}
  .btn-outline{background:transparent!important;border:2px solid var(--gold);color:var(--gold-light)!important}
  .share-hint{text-align:center;color:var(--gold);font-size:11px;opacity:.5;margin-top:12px}

  /* image overlay */
  .img-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;flex-direction:column;align-items:center;justify-content:center;padding:20px}
  .img-overlay.show{display:flex}
  .img-overlay img{max-width:92%;max-height:70vh;border-radius:8px;box-shadow:0 4px 30px rgba(0,0,0,.5)}
  .img-overlay .overlay-hint{color:var(--gold-light);font-size:14px;margin-top:16px;text-align:center;line-height:1.6}
  .img-overlay .overlay-close{position:absolute;top:16px;right:20px;color:#fff;font-size:28px;cursor:pointer;opacity:.7;z-index:201}
  .img-overlay .overlay-close:hover{opacity:1}
  .img-overlay .overlay-save-btn{margin-top:14px;padding:10px 36px;border:1.5px solid var(--gold);border-radius:6px;background:linear-gradient(180deg,var(--red),#6B1D00);color:var(--gold-light);font-family:'Ma Shan Zheng',cursive;font-size:18px;letter-spacing:3px;cursor:pointer}

  @media(max-width:420px){
    .main-title{font-size:28px}.result-official{font-size:34px}.scroll-body{padding:36px 18px 28px}.quiz-card{padding:22px 16px}.result-card{padding:30px 16px 22px}
  }
</style>
</head>
<body>
<div class="app">

  <!-- START -->
  <div id="screen-start" class="screen active">
    <div class="scroll-container">
      <div class="scroll-body">
        <div class="seal">转世<br>司</div>
        <h1 class="main-title">你的职场前世档案</h1>
        <p class="sub-title">大AI朝 · 吏部转世司鉴定</p>
        <div class="divider"></div>
        <div class="name-input-group">
          <label>报上名来，待转世司调取你的前世档案</label>
          <input type="text" id="nameInput" placeholder="输入你的姓名" maxlength="8">
        </div>
        <button class="btn" onclick="startQuiz()">开 启 档 案</button>
        <p class="start-hint">— 十道命题，还原你的职场前世 —</p>
      </div>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-header">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <span class="progress-text" id="progressText">1/10</span>
    </div>
    <div class="quiz-card" id="quizCard">
      <div class="question-scene" id="questionScene"></div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="optionsContainer"></div>
    </div>
  </div>

  <!-- LOADING -->
  <div id="screen-loading" class="screen">
    <div class="loading-seal"><span class="loading-icon">📜</span></div>
    <div class="loading-text">转世司查档中</div>
    <div class="loading-sub" id="loadingSub">正在翻阅三生石上的记录...</div>
  </div>

  <!-- RESULT -->
  <div id="screen-result" class="screen">
    <div class="result-card" id="resultCard">
      <div class="result-stamp" id="resultStamp">准</div>
      <div class="decree-header">
        <div class="decree-cloud">☁ ☁ ☁</div>
        <div class="decree-title">职场前世档案</div>
      </div>
      <div class="decree-line"></div>
      <div class="result-avatar-area">
        <div class="result-avatar" id="resultAvatar">
          <span class="rank-badge" id="resultRankBadge"></span>
        </div>
      </div>
      <div class="decree-body">
        <div class="decree-opening">转世司查明：</div>
        <div class="result-name" id="resultName"></div>
        <div class="result-official" id="resultOfficial"></div>
        <div class="result-rank" id="resultRank"></div>
        <div class="result-rarity" id="resultRarity"></div>
      </div>
      <div class="result-quote" id="resultQuote"></div>
      <div class="bio-section">
        <div class="bio-title">📖 前世履历</div>
        <div class="bio-timeline" id="bioTimeline"></div>
      </div>
      <div class="result-stats" id="resultStats"></div>
      <div class="cp-section">
        <div class="cp-title">🤝 官场关系</div>
        <div id="cpContent"></div>
      </div>
      <div class="decree-line"></div>
      <div class="decree-footer">大AI朝六年六月 · 转世司 印</div>
    </div>
    <div class="result-actions">
      <button class="btn btn-outline" onclick="restart()">再测一次</button>
      <button class="btn" onclick="shareResult()">保存图片</button>
    </div>
    <p class="share-hint">点击按钮生成图片，手机端长按图片可保存到相册 ✨</p>
  </div>
</div>

<!-- Image Overlay -->
<div class="img-overlay" id="imgOverlay" onclick="closeOverlay(event)">
  <span class="overlay-close" onclick="closeOverlay()">&times;</span>
  <img id="overlayImg" src="" alt="结果卡片">
  <div class="overlay-hint" id="overlayHint"></div>
  <button class="overlay-save-btn" id="overlaySaveBtn" onclick="downloadImage()">下载图片</button>
</div>

<!-- Roast Toast -->
<div class="roast-toast" id="roastToast"></div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
// ============================================================
// QUESTIONS — 穿越叙事线
// ============================================================
const QUESTIONS = [
  {
    scene: '💫 第一卷 · 初入此世',
    text: '如果穿越到古代，你最希望醒来时身处何方？',
    options: [
      { text: '权臣府邸的书房——桌上摊着半份未批的奏折', scores:{power:2,brain:2}, roast:'前世就是卷王命' },
      { text: '边关军营的帐篷——远处号角声刚刚响起', scores:{courage:3,execute:1}, roast:'上辈子也没逃过996' },
      { text: '繁华闹市的酒楼——怀里揣着花不完的银子', scores:{social:2,chill:2}, roast:'投胎投到了CBD' },
      { text: '云雾深山的竹屋——窗外只有鸟叫和溪水声', scores:{freedom:3,chill:1}, roast:'恭喜，穿到了退休状态' }
    ]
  },
  {
    scene: '🔐 第二卷 · 天降密信',
    text: '路上你捡到一封密信，拆开一看——是朝中重臣贪腐的铁证。你会？',
    options: [
      { text: '连夜抄一份备份，把原件匿名送到御史台', scores:{brain:3,justice:1}, roast:'社畜本能：凡事留个备份' },
      { text: '直接实名上交，哪怕得罪权贵也无所谓', scores:{justice:3,courage:1}, roast:'前世就爱在群里@所有人' },
      { text: '先查清楚这个重臣的势力范围再决定', scores:{power:3,brain:1}, roast:'职场生存指南满分学员' },
      { text: '假装没看见，这种事掺和了没好下场', scores:{chill:3,freedom:1}, roast:'不是我的KPI，告辞' }
    ]
  },
  {
    scene: '📝 第三卷 · 科举之日',
    text: '科举考场上，最后一题完全没见过。交卷还有半炷香，你——',

const OFFICIAL_MAP = {};
OFFICIALS.forEach(o => OFFICIAL_MAP[o.id] = o);

// ============================================================
// STATE
// ============================================================
let userName = '', currentQ = 0, scores = {};
const LABELS = ['A','B','C','D'];

function resetScores(){ scores = {power:0,brain:0,courage:0,execute:0,justice:0,social:0,chill:0,freedom:0,loyalty:0} }

function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active') }

function startQuiz(){
  userName = document.getElementById('nameInput').value.trim() || '无名氏';
  currentQ = 0; resetScores();
  showScreen('screen-quiz'); renderQuestion();
}

function renderQuestion(){
  const q = QUESTIONS[currentQ];
  document.getElementById('progressFill').style.width = ((currentQ+1)/QUESTIONS.length*100)+'%';
  document.getElementById('progressText').textContent = (currentQ+1)+'/'+QUESTIONS.length;
  const card = document.getElementById('quizCard');
  card.style.animation='none'; card.offsetHeight; card.style.animation='cardIn .4s ease-out';
  document.getElementById('questionScene').textContent = q.scene;
  document.getElementById('questionText').textContent = q.text;
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  q.options.forEach((opt,i)=>{
    const btn = document.createElement('button');
    btn.className='option-btn';
    btn.innerHTML=`<span class="opt-label">${LABELS[i]}</span>${opt.text}`;
    btn.onclick=()=>selectOption(i);
    container.appendChild(btn);
  });
}

function showRoast(text){
  const toast = document.getElementById('roastToast');
  toast.textContent = '「'+text+'」';
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'), 1800);
}

function selectOption(idx){
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b=>b.classList.remove('selected'));
  btns[idx].classList.add('selected');
  const opt = QUESTIONS[currentQ].options[idx];
  for(const k in opt.scores) scores[k] = (scores[k]||0) + opt.scores[k];
  showRoast(opt.roast);
  setTimeout(()=>{
    currentQ++;
    if(currentQ < QUESTIONS.length) renderQuestion();
    else showLoading();
  }, 900);
}

function showLoading(){
  showScreen('screen-loading');
  const phrases = ['正在翻阅三生石上的记录...','转世司侍郎正在核对档案...','调取你的前世功过簿...','查到了……正在生成档案...','档案已调出，即将揭晓——'];
  const sub = document.getElementById('loadingSub');
  let pi=0;
  const interval = setInterval(()=>{ pi++; if(pi<phrases.length) sub.textContent=phrases[pi]; },550);
  setTimeout(()=>{ clearInterval(interval); showResult(); }, 3000);
}

function showResult(){
  let best=OFFICIALS[0], bestScore=-Infinity;
  OFFICIALS.forEach(o=>{
    const s=o.match(scores);
    if(s>bestScore){ bestScore=s; best=o; }
  });

  showScreen('screen-result');
  document.getElementById('resultAvatar').firstChild.textContent = best.emoji;
  document.getElementById('resultRankBadge').textContent = best.rank;
  document.getElementById('resultName').textContent = `转世司查明：${userName} 前世乃——`;
  document.getElementById('resultOfficial').textContent = best.title;
  document.getElementById('resultRank').textContent = best.rank;
  document.getElementById('resultRarity').textContent = best.rarity;
  document.getElementById('resultQuote').innerText = best.quote(userName);

  // biography
  const timeline = document.getElementById('bioTimeline');
  timeline.innerHTML='';
  best.bio(userName).forEach(ev=>{
    const div=document.createElement('div'); div.className='bio-event';
    div.innerHTML=`<span class="bio-age">${ev.age}</span><span class="bio-text">${ev.text}</span>`;
    timeline.appendChild(div);
  });

  // stats
  const statsC = document.getElementById('resultStats');
  statsC.innerHTML='';
  best.stats.forEach((st,i)=>{
    const row=document.createElement('div'); row.className='stat-row';
    row.innerHTML=`<span class="stat-label">${st.label}</span><div class="stat-bar"><div class="stat-fill ${st.color}" style="width:0%"></div></div><span class="stat-val">${st.pct}%</span>`;
    statsC.appendChild(row);
    setTimeout(()=>row.querySelector('.stat-fill').style.width=st.pct+'%', 300+i*200);
  });

  // CP
  const cpC = document.getElementById('cpContent');
  const bestCPObj = OFFICIAL_MAP[best.bestCP];
  const worstCPObj = OFFICIAL_MAP[best.worstCP];
  cpC.innerHTML=`
    <div class="cp-row">
      <div class="cp-icon">${bestCPObj.emoji}</div>
      <div class="cp-info">
        <div class="cp-label">💛 最佳搭档</div>
        <div class="cp-name">${bestCPObj.title}</div>
        <div class="cp-reason">${best.bestCPReason}</div>
      </div>
    </div>
    <div class="cp-divider"></div>
    <div class="cp-row">
      <div class="cp-icon">${worstCPObj.emoji}</div>
      <div class="cp-info">
        <div class="cp-label">⚡ 天生冤家</div>
        <div class="cp-name">${worstCPObj.title}</div>
        <div class="cp-reason">${best.worstCPReason}</div>
      </div>
    </div>
  `;
}

function restart(){ document.getElementById('nameInput').value=''; showScreen('screen-start'); window.scrollTo(0,0); }

function shareResult(){ saveCardAsImage(); }

let currentImageDataUrl = '';

function saveCardAsImage(){
  const card = document.getElementById('resultCard');
  html2canvas(card, {
    backgroundColor: '#F5E6C8',
    scale: 2,
    useCORS: true,
    logging: false
  }).then(canvas => {
    currentImageDataUrl = canvas.toDataURL('image/png');
    const overlay = document.getElementById('imgOverlay');
    const img = document.getElementById('overlayImg');
    const hint = document.getElementById('overlayHint');
    const saveBtn = document.getElementById('overlaySaveBtn');
    img.src = currentImageDataUrl;
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    if(isMobile){
      hint.textContent = '📱 长按上方图片即可保存到相册';
      saveBtn.style.display = 'none';
    } else {
      hint.textContent = '💻 点击下方按钮下载图片';
      saveBtn.style.display = 'block';
    }
    overlay.classList.add('show');
  }).catch(()=>{
    alert('图片生成失败，请手动截屏 📸');
  });
}

function downloadImage(){
  if(!currentImageDataUrl) return;
  const link = document.createElement('a');
  link.download = '职场前世档案_' + userName + '.png';
  link.href = currentImageDataUrl;
  link.click();
}

function closeOverlay(e){
  if(e && e.target.tagName === 'IMG') return;
  document.getElementById('imgOverlay').classList.remove('show');
}

document.addEventListener('dblclick', function(e){
  const card = document.getElementById('resultCard');
  if(card && card.contains(e.target) && document.getElementById('screen-result').classList.contains('active')){
    saveCardAsImage();
  }
});

document.getElementById('nameInput').addEventListener('keyup',e=>{ if(e.key==='Enter') startQuiz(); });
</script>
